name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installation reproductible (lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests unitaires
        run: npm test

      # Le build tourne sans secrets : la config (Sentry, CSP) a des
      # fallbacks prévus pour un environnement CI autonome.
      - name: Build de production
        run: npm run build

  site:
    name: Site vitrine · Typecheck · Lint · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Installation reproductible (lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build statique
        run: npm run build

  audit:
    name: npm audit (vulnérabilités)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Échoue dès qu'une vulnérabilité de sévérité modérée ou plus est
      # publiée pour une dépendance du lockfile (prod comme dev).
      - name: Audit des dépendances
        run: npm audit --audit-level=moderate

      - name: Audit des dépendances (site vitrine)
        working-directory: site
        run: npm audit --audit-level=moderate

  database-security:
    name: PostgreSQL · ACL · RLS · Intégrité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Démarrer Supabase et appliquer toutes les migrations
        run: supabase start

      - name: Audit pgTAP des ACL et politiques réelles
        run: supabase test db supabase/tests/security_acl.test.sql supabase/tests/contest_leaderboard.test.sql

  e2e:
    name: E2E Playwright (Chromium · WebKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installation reproductible (lockfile)
        run: npm ci

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Démarrer Supabase (migrations appliquées)
        run: supabase start

      - name: Seed E2E déterministe
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f supabase/seed.sql

      - name: Environnement de l'app (clés du Supabase local + secrets factices)
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
            echo "NEXT_PUBLIC_APP_URL=http://localhost:3000"
            echo "SPIN_TOKEN_SECRET=$(openssl rand -hex 32)"
            echo "CLAIM_TOKEN_SECRET=$(openssl rand -hex 32)"
            echo "PLAYER_KEY_SALT=$(openssl rand -hex 32)"
            echo "UNSUBSCRIBE_TOKEN_SECRET=$(openssl rand -hex 32)"
            echo "TEAM_INVITE_TOKEN_SECRET=$(openssl rand -hex 32)"
            echo "CRON_SECRET=$(openssl rand -hex 16)"
            # next start force NODE_ENV=production : sans cette variable,
            # l'anti-robot devient obligatoire, les spins sont bloqués et
            # /api/health répond 503 (configuration de sécurité incomplète).
            echo "TURNSTILE_REQUIRED=false"
            # Stripe : clé factice (le webhook instancie le client pour
            # vérifier la signature) + secret partagé avec les specs +
            # API détournée vers le stub local (e2e/api-stubs.mjs).
            echo "STRIPE_SECRET_KEY=sk_test_$(openssl rand -hex 12)"
            echo "STRIPE_WEBHOOK_SECRET=whsec_$(openssl rand -hex 24)"
            echo "STRIPE_API_BASE=http://127.0.0.1:12111"
            # Resend : le SDK honore RESEND_BASE_URL → stub local ; le
            # chemin d'envoi RÉUSSI de la newsletter devient testable.
            echo "RESEND_API_KEY=re_test_$(openssl rand -hex 12)"
            echo "RESEND_FROM_EMAIL=Lastchance E2E <e2e@test.local>"
            echo "RESEND_BASE_URL=http://127.0.0.1:12112"
          } >> "$GITHUB_ENV"

      - name: Build de production
        run: npm run build

      - name: Démarrer l'app (+ proxy TLS pour les cookies Secure)
        run: |
          # Stubs d'API externes (Stripe :12111, Resend :12112).
          node e2e/api-stubs.mjs &
          npx wait-on -t 15000 tcp:12111 tcp:12112
          npm run start &
          npx wait-on -t 60000 tcp:3000
          # WebKit refuse les cookies Secure sur http://localhost : les
          # tests passent par ce proxy HTTPS auto-signé.
          npx local-ssl-proxy --source 3443 --target 3000 &
          npx wait-on -t 30000 tcp:3443
          echo "E2E_BASE_URL=https://localhost:3443" >> "$GITHUB_ENV"
          echo "— /api/health (diagnostic non bloquant) —"
          curl -s http://localhost:3000/api/health || true
          echo

      # Diagnostic : si les pages publiques n'affichent pas le jeu, le
      # message d'erreur exact apparaît ici (chaîne QR→campagne→roue ou
      # client service role) — évite de déboguer à l'aveugle via Playwright.
      - name: Diagnostic pages publiques (non bloquant)
        run: |
          echo "— PostgREST direct (embed loadPlayContext) —"
          eval "$(supabase status -o env | grep -E '^(SERVICE_ROLE_KEY)=')"
          curl -s "http://127.0.0.1:54321/rest/v1/qr_codes?slug=eq.E2EWIN01&select=id,campaigns!qr_codes_campaign_id_fkey(status,wheels!wheels_campaign_id_fkey(id,prizes!prizes_wheel_id_fkey(id)))" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" | head -c 600 || true
          echo
          for p in play/E2EWIN01 play/E2EPAUSE pronos/E2EPRONO; do
            echo "— /$p —"
            curl -s "http://localhost:3000/$p" | grep -oE "(Ce lien de jeu n'existe pas|momentanément désactivé|pas active|pas encore commencé|est terminée|Oups[^<]*|Une erreur[^<]*|Tournez la roue|Je participe|Championnat introuvable)" | sort -u | head -5 || true
          done

      - name: Navigateurs Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Tests E2E
        run: npx playwright test

      # Une suite entièrement ignorée passerait en silence : on exige
      # qu'au moins un test se soit réellement exécuté.
      - name: Aucun test exécuté = échec
        if: always()
        run: |
          if [ ! -f playwright-report.json ]; then
            echo "Pas de rapport Playwright (étape précédente en échec) — rien à vérifier ici."
            exit 0
          fi
          executed=$(node -e "const r=require('./playwright-report.json');console.log(r.stats.expected + r.stats.unexpected + r.stats.flaky)")
          echo "Tests exécutés : $executed"
          if [ "$executed" -eq 0 ]; then
            echo "::error::Aucun test E2E ne s'est exécuté (tous ignorés ?)"
            exit 1
          fi

  codeql:
    name: CodeQL · JavaScript / TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
