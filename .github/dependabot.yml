# Mises à jour automatiques des dépendances (sécurité + fraîcheur).
# Les PR Dependabot passent par la CI (typecheck, lint, tests, build,
# npm audit) avant merge — voir .github/workflows/ci.yml.
version: 2
updates:
  # Dépendances npm : un lot hebdomadaire, groupées pour limiter le bruit.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    groups:
      # Patches et mineures regroupées en une seule PR par semaine ;
      # les majeures restent des PR individuelles à examiner à la main.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Next 16.2 / eslint-config-next 16.2 ne prennent pas encore en charge
    # TypeScript 6+ ni ESLint 10. On garde les patches de la majeure active
    # et on laisse Dependabot reproposer la prochaine majeure compatible.
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # Le site vitrine possède son propre lockfile.
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps-site"

  # Actions GitHub utilisées par la CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
